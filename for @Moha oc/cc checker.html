<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SanZoi CC Checker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes glow {
            0%, 100% { box-shadow: 0 0 20px rgba(102, 126, 234, 0.5); }
            50% { box-shadow: 0 0 40px rgba(118, 75, 162, 0.8); }
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(-45deg, #0f0c29, #302b63, #24243e, #1a1a2e);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            min-height: 100vh;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            background: 
                radial-gradient(circle at 20% 80%, rgba(102, 126, 234, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(118, 75, 162, 0.1) 0%, transparent 50%);
            pointer-events: none;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: rgba(26, 26, 46, 0.9);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            overflow: hidden;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(102, 126, 234, 0.2);
            animation: slideIn 0.6s ease-out;
        }

        .header {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.2) 0%, rgba(118, 75, 162, 0.2) 100%);
            color: white;
            padding: 40px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(102, 126, 234, 0.1), transparent);
            animation: gradientShift 3s linear infinite;
        }

        .header h1 {
            font-size: 36px;
            margin-bottom: 10px;
            position: relative;
            z-index: 1;
            text-shadow: 0 0 20px rgba(102, 126, 234, 0.5);
            animation: float 3s ease-in-out infinite;
        }

        .header p {
            opacity: 0.8;
            font-size: 14px;
            position: relative;
            z-index: 1;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        #authScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(-45deg, #0f0c29, #302b63, #24243e);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        #authScreen h2 {
            color: white;
            font-size: 42px;
            margin-bottom: 20px;
            text-shadow: 0 0 30px rgba(102, 126, 234, 0.8);
            animation: pulse 2s ease-in-out infinite;
        }

        #authScreen p {
            color: rgba(255,255,255,0.7);
            margin-bottom: 30px;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-size: 14px;
        }

        #authScreen input {
            padding: 15px 30px;
            border: 2px solid rgba(102, 126, 234, 0.5);
            background: rgba(26, 26, 46, 0.8);
            color: white;
            border-radius: 10px;
            font-size: 16px;
            width: 300px;
            text-align: center;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
        }

        #authScreen input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 30px rgba(102, 126, 234, 0.5);
            transform: scale(1.05);
        }

        #authScreen input::placeholder {
            color: rgba(255,255,255,0.3);
        }

        #authScreen button {
            margin-top: 20px;
            padding: 15px 50px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            font-size: 16px;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        #authScreen button:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.5);
        }

        .locked {
            filter: blur(10px);
            pointer-events: none;
            user-select: none;
        }

        .content {
            padding: 40px;
        }

        .processor-select {
            display: flex;
            gap: 20px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        .processor-btn {
            flex: 1;
            min-width: 150px;
            padding: 20px;
            border: 2px solid rgba(102, 126, 234, 0.3);
            background: rgba(26, 26, 46, 0.6);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.4s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            color: white;
            font-weight: 600;
            position: relative;
            overflow: hidden;
        }

        .processor-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(102, 126, 234, 0.3), transparent);
            transition: left 0.5s;
        }

        .processor-btn:hover::before {
            left: 100%;
        }

        .processor-btn:hover {
            border-color: #667eea;
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .processor-btn.active {
            border-color: #667eea;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.3) 0%, rgba(118, 75, 162, 0.3) 100%);
            animation: glow 2s ease-in-out infinite;
        }

        .processor-btn span:first-child {
            font-size: 24px;
        }

        .input-section {
            margin-bottom: 40px;
        }

        .input-section h3 {
            margin-bottom: 20px;
            color: white;
            font-size: 20px;
            text-shadow: 0 0 10px rgba(102, 126, 234, 0.5);
        }

        textarea {
            width: 100%;
            min-height: 250px;
            padding: 20px;
            border: 2px solid rgba(102, 126, 234, 0.3);
            border-radius: 12px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            resize: vertical;
            background: rgba(15, 12, 41, 0.8);
            color: #00ff88;
            transition: all 0.3s;
        }

        textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 20px rgba(102, 126, 234, 0.3);
        }

        textarea::placeholder {
            color: rgba(0, 255, 136, 0.3);
        }

        .format-info {
            margin-top: 15px;
            padding: 15px;
            background: rgba(102, 126, 234, 0.1);
            border-radius: 8px;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.7);
            border-left: 3px solid #667eea;
        }

        .controls {
            display: flex;
            gap: 20px;
            margin-bottom: 40px;
        }

        .btn {
            padding: 18px 40px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            flex: 1;
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 40px rgba(102, 126, 234, 0.5);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.2);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-3px);
        }

        .results {
            display: none;
            animation: slideIn 0.5s ease-out;
        }

        .results.active {
            display: block;
        }

        .results h3 {
            margin-bottom: 25px;
            color: white;
            font-size: 24px;
            text-shadow: 0 0 10px rgba(102, 126, 234, 0.5);
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255, 255, 255, 0.05), transparent);
            animation: gradientShift 3s linear infinite;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-card.total {
            background: linear-gradient(135deg, rgba(0, 255, 255, 0.2) 0%, rgba(0, 255, 255, 0.1) 100%);
            border: 2px solid rgba(0, 255, 255, 0.3);
        }

        .stat-card.valid {
            background: linear-gradient(135deg, rgba(0, 255, 136, 0.2) 0%, rgba(0, 255, 136, 0.1) 100%);
            border: 2px solid rgba(0, 255, 136, 0.3);
        }

        .stat-card.invalid {
            background: linear-gradient(135deg, rgba(255, 68, 68, 0.2) 0%, rgba(255, 68, 68, 0.1) 100%);
            border: 2px solid rgba(255, 68, 68, 0.3);
        }

        .stat-card .number {
            font-size: 42px;
            font-weight: bold;
            margin-bottom: 10px;
            color: white;
            position: relative;
            z-index: 1;
            text-shadow: 0 0 20px currentColor;
        }

        .stat-card .label {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.7);
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            z-index: 1;
        }

        .result-list {
            max-height: 500px;
            overflow-y: auto;
            border: 2px solid rgba(102, 126, 234, 0.3);
            border-radius: 12px;
            background: rgba(15, 12, 41, 0.6);
        }

        .result-list::-webkit-scrollbar {
            width: 10px;
        }

        .result-list::-webkit-scrollbar-track {
            background: rgba(26, 26, 46, 0.5);
        }

        .result-list::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 5px;
        }

        .result-item {
            padding: 20px;
            border-bottom: 1px solid rgba(102, 126, 234, 0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s;
            animation: slideIn 0.3s ease-out;
        }

        .result-item:hover {
            background: rgba(102, 126, 234, 0.1);
            transform: translateX(5px);
        }

        .result-item:last-child {
            border-bottom: none;
        }

        .card-number {
            font-family: 'Courier New', monospace;
            font-weight: 600;
            color: #00ff88;
            text-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
        }

        .status {
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .status.valid {
            background: linear-gradient(135deg, rgba(0, 255, 136, 0.3) 0%, rgba(0, 255, 136, 0.2) 100%);
            color: #00ff88;
            border: 1px solid rgba(0, 255, 136, 0.5);
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.3);
        }

        .status.invalid {
            background: linear-gradient(135deg, rgba(255, 68, 68, 0.3) 0%, rgba(255, 68, 68, 0.2) 100%);
            color: #ff4444;
            border: 1px solid rgba(255, 68, 68, 0.5);
            box-shadow: 0 0 15px rgba(255, 68, 68, 0.3);
        }

        .progress {
            display: none;
            margin-bottom: 30px;
        }

        .progress.active {
            display: block;
            animation: slideIn 0.5s ease-out;
        }

        .progress-bar {
            width: 100%;
            height: 40px;
            background: rgba(15, 12, 41, 0.8);
            border-radius: 20px;
            overflow: hidden;
            border: 2px solid rgba(102, 126, 234, 0.3);
            position: relative;
        }

        .progress-bar::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(102, 126, 234, 0.1), transparent);
            animation: gradientShift 2s linear infinite;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            width: 0%;
            transition: width 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 14px;
            font-weight: 700;
            text-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
            position: relative;
            z-index: 1;
            box-shadow: 0 0 20px rgba(102, 126, 234, 0.5);
        }

        #authError {
            color: #ff4444;
            margin-top: 15px;
            display: none;
            animation: pulse 0.5s ease-in-out;
            text-shadow: 0 0 10px rgba(255, 68, 68, 0.5);
        }
    </style>
</head>
<body>
    <div id="authScreen">
        <h2>🔐 SANZOI SYSTEM</h2>
        <p>Authorization Required</p>
        <input type="password" id="authCode" placeholder="ENTER ACCESS CODE">
        <button onclick="checkAuth()">UNLOCK</button>
        <p id="authError">⚠️ ACCESS DENIED</p>
    </div>

    <div class="container locked" id="mainContent">
        <div class="header">
            <h1>⚡ SANZOI CC CHECKER ⚡</h1>
            <p>Advanced Verification System</p>
        </div>

        <div class="content">
            <div class="processor-select">
                <button class="processor-btn active" data-processor="stripe">
                    <span>💳</span>
                    <span>Stripe</span>
                </button>
                <button class="processor-btn" data-processor="braintree">
                    <span>🌳</span>
                    <span>Braintree</span>
                </button>
                <button class="processor-btn" data-processor="amazon">
                    <span>📦</span>
                    <span>Amazon Pay</span>
                </button>
            </div>

            <div class="input-section">
                <h3>⚙️ Input Cards</h3>
                <textarea id="cardInput" placeholder="Enter card data (one per line)&#10;Example:&#10;4242424242424242|12|2025|123&#10;5555555555554444|10|2026|456&#10;378282246310005|08|2027|789"></textarea>
                <div class="format-info">
                    📋 Format: CardNumber|MM|YYYY|CVV (separated by pipe character)
                </div>
            </div>

            <div class="controls">
                <button class="btn btn-primary" id="checkBtn">🚀 START CHECK</button>
                <button class="btn btn-secondary" id="clearBtn">🗑️ CLEAR</button>
            </div>

            <div class="progress" id="progress">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill">0%</div>
                </div>
            </div>

            <div class="results" id="results">
                <h3>📊 Results</h3>
                <div class="stats">
                    <div class="stat-card total">
                        <div class="number" id="totalCards">0</div>
                        <div class="label">Total Checked</div>
                    </div>
                    <div class="stat-card valid">
                        <div class="number" id="validCards">0</div>
                        <div class="label">Valid Format</div>
                    </div>
                    <div class="stat-card invalid">
                        <div class="number" id="invalidCards">0</div>
                        <div class="label">Invalid Format</div>
                    </div>
                </div>
                <div class="result-list" id="resultList"></div>
            </div>
        </div>
    </div>

    <script>
        let selectedProcessor = 'stripe';
        let authenticated = false;

        function checkAuth() {
            const code = document.getElementById('authCode').value;
            if (code.toLowerCase() === 'sanzoi') {
                authenticated = true;
                const authScreen = document.getElementById('authScreen');
                authScreen.style.opacity = '0';
                authScreen.style.transition = 'opacity 0.5s';
                setTimeout(() => {
                    authScreen.style.display = 'none';
                    document.getElementById('mainContent').classList.remove('locked');
                }, 500);
            } else {
                const errorEl = document.getElementById('authError');
                errorEl.style.display = 'block';
                document.getElementById('authCode').style.borderColor = '#ff4444';
                setTimeout(() => {
                    errorEl.style.display = 'none';
                    document.getElementById('authCode').style.borderColor = 'rgba(102, 126, 234, 0.5)';
                }, 2000);
            }
        }

        document.getElementById('authCode')?.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') checkAuth();
        });
        
        document.querySelectorAll('.processor-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.processor-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                selectedProcessor = btn.dataset.processor;
            });
        });

        document.getElementById('checkBtn').addEventListener('click', () => {
            const input = document.getElementById('cardInput').value.trim();
            if (!input) {
                alert('Please enter card data to check');
                return;
            }

            const cards = input.split('\n').filter(line => line.trim());
            simulateCheck(cards);
        });

        document.getElementById('clearBtn').addEventListener('click', () => {
            document.getElementById('cardInput').value = '';
            document.getElementById('results').classList.remove('active');
            document.getElementById('progress').classList.remove('active');
        });

        function simulateCheck(cards) {
            const progress = document.getElementById('progress');
            const progressFill = document.getElementById('progressFill');
            const results = document.getElementById('results');
            const resultList = document.getElementById('resultList');
            
            progress.classList.add('active');
            results.classList.remove('active');
            resultList.innerHTML = '';
            
            let processed = 0;
            let valid = 0;
            let invalid = 0;
            
            const interval = setInterval(() => {
                if (processed >= cards.length) {
                    clearInterval(interval);
                    progress.classList.remove('active');
                    results.classList.add('active');
                    return;
                }
                
                const card = cards[processed];
                const parts = card.split('|');
                const isValid = parts.length === 4 && parts[0].length >= 13;
                
                if (isValid) valid++;
                else invalid++;
                
                processed++;
                
                const percentage = Math.round((processed / cards.length) * 100);
                progressFill.style.width = percentage + '%';
                progressFill.textContent = percentage + '%';
                
                document.getElementById('totalCards').textContent = processed;
                document.getElementById('validCards').textContent = valid;
                document.getElementById('invalidCards').textContent = invalid;
                
                const resultItem = document.createElement('div');
                resultItem.className = 'result-item';
                resultItem.innerHTML = `
                    <span class="card-number">${parts[0] ? parts[0].substring(0, 4) + '****' + parts[0].substring(parts[0].length - 4) : 'Invalid'}</span>
                    <span class="status ${isValid ? 'valid' : 'invalid'}">${isValid ? '✓ Valid' : '✗ Invalid'}</span>
                `;
                resultList.insertBefore(resultItem, resultList.firstChild);
                
            }, 200);
        }
    </script>
</body>
</html>
